<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Alistair — Control Center</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23000'/%3E%3Cpath d='M35 40 h30 M50 40 v30 M38 56 h16' stroke='%23fff' stroke-width='4.5' stroke-linecap='round' fill='none'/%3E%3C/svg%3E">
<meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme:light)">
<meta name="theme-color" content="#1C1C1E" media="(prefers-color-scheme:dark)">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Alistair">
<link rel="apple-touch-icon" href="/alistair-logo.png">
<link rel="dns-prefetch" href="//news.alistairlendor.com">
<link rel="dns-prefetch" href="//finance.alistairlendor.com">
<link rel="preconnect" href="https://news.alistairlendor.com" crossorigin>
<link rel="preconnect" href="https://finance.alistairlendor.com" crossorigin>
<link rel="preload" href="portfolio-latest.json" as="fetch" crossorigin>
<link rel="preload" href="archive-data.json" as="fetch" crossorigin>

<style>
:root{
  --bg:#F2F2F7; --bg-card:#FFFFFF;
  --separator:rgba(60,60,67,0.08); --separator-thick:rgba(60,60,67,0.18);
  --label:#000000; --label2:rgba(60,60,67,0.6); --label3:rgba(60,60,67,0.3);
  --fill:rgba(120,120,128,0.12); --fill-hv:rgba(120,120,128,0.18);
  --blue:#007AFF; --green:#34C759; --orange:#FF9500; --red:#FF3B30; --purple:#AF52DE; --teal:#5AC8FA;
  --radius-xl:21px; --radius-2xl:26px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --f:-apple-system,'Helvetica Neue','SF Pro Display','SF Pro Text',system-ui,sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1C1C1E; --bg-card:#2C2C2E;
    --separator:rgba(255,255,255,0.08); --separator-thick:rgba(255,255,255,0.18);
    --label:#FFFFFF; --label2:rgba(255,255,255,0.6); --label3:rgba(255,255,255,0.3);
    --fill:rgba(120,120,128,0.24); --fill-hv:rgba(120,120,128,0.36);
    --blue:#0A84FF; --green:#30D158; --orange:#FF9F0A; --red:#FF453A; --purple:#BF5AF2; --teal:#64D2FF;
  }
  .profile-av{box-shadow:0 2px 8px rgba(0,0,0,0.3)}
  .status-bar{background:rgba(28,28,30,0.94)}
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
body{
  font-family:var(--f); background:var(--bg); color:var(--label);
  -webkit-font-smoothing:antialiased; padding-bottom:var(--safe-bottom); min-height:100%;
  max-width:480px; margin:0 auto;
}

/* ── Status Bar ── */
.status-bar{height:44px;background:rgba(249,249,249,0.94);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:600;color:var(--label);border-bottom:0.5px solid var(--separator)}
.status-bar time{font-variant-numeric:tabular-nums}

/* ── Profile ── */
.profile{margin:8px 16px 0;padding:16px 18px;background:var(--bg-card);border-radius:var(--radius-2xl);display:flex;align-items:center;gap:12px}
.profile-av{width:48px;height:48px;border-radius:50%;background:#000;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.profile-av svg{width:24px;height:24px}
.profile-ct{flex:1;min-width:0}
.profile-n{font-size:1.1rem;font-weight:700;letter-spacing:-0.3px}
.profile-s{font-size:0.78rem;color:var(--label2);margin-top:1px}
.profile-b{width:32px;height:32px;border-radius:50%;background:var(--fill);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:none;cursor:pointer;color:var(--blue);font-size:0.82rem}
.profile-b:active{transform:scale(0.92)}

/* ── Section ── */
.sh{margin:20px 16px 6px}
.sh-l{font-size:0.75rem;font-weight:600;color:var(--label2);text-transform:uppercase;letter-spacing:0.5px}

/* ── Product Card ── */
.p-card{
  margin:0 16px 12px;padding:16px 16px 14px;
  background:var(--bg-card);border-radius:var(--radius-2xl);
  cursor:pointer;transition:transform 0.15s;
}
.p-card:active{transform:scale(0.98)}
.p-card-h{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.p-card-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.p-card-ico svg{width:15px;height:15px}
.p-card-title{font-size:0.85rem;font-weight:600;color:var(--label)}
.p-card-time{font-size:0.6rem;color:var(--label3);font-weight:500;margin-left:auto}
.p-card-body{font-size:0.72rem;color:var(--label2);line-height:1.5}

/* ── Briefing ── */
.brief-headline{font-size:0.82rem;font-weight:600;color:var(--label);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.brief-summary{font-size:0.7rem;color:var(--label2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-top:3px}

/* ── Portfolio ── */
.port-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px}
.port-nw{font-size:1.3rem;font-weight:700;color:var(--label);letter-spacing:-0.5px;font-variant-numeric:tabular-nums}
.port-ch{font-size:0.78rem;font-weight:600;font-variant-numeric:tabular-nums}
.port-spark{height:32px;margin-bottom:8px}
.port-spark svg{width:100%;height:32px;display:block}
.port-divider{height:0.5px;background:var(--separator);margin:8px 0}
.port-hold{display:flex;align-items:center;padding:4px 0}
.port-hl{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.port-hd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.port-hn{font-size:0.7rem;font-weight:500;color:var(--label);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.port-hc{font-size:0.6rem;color:var(--label3);margin-left:4px;font-feature-settings:"tnum"}
.port-hr{text-align:right;flex-shrink:0}
.port-hv{font-size:0.72rem;font-weight:600;color:var(--label);font-feature-settings:"tnum"}
.port-bar{height:3px;border-radius:2px;background:var(--fill);margin-top:3px;overflow:hidden}
.port-bar-f{height:100%;border-radius:2px}
.port-empty,.fin-empty,.tok-empty,.brief-empty{font-size:0.68rem;color:var(--label3);font-style:italic;padding:6px 0}
.port-loading,.fin-loading,.tok-loading{font-size:0.62rem;color:var(--label3);padding:6px 0}

/* ── Finance ── */
.fin-row{display:flex;align-items:baseline;justify-content:space-between;padding:3px 0}
.fin-l{font-size:0.7rem;color:var(--label2)}
.fin-v{font-size:0.82rem;font-weight:600;font-variant-numeric:tabular-nums}
.fin-v.inc{color:var(--red)}.fin-v.exp{color:var(--green)}.fin-v.net{color:var(--blue)}
.fin-divider{height:0.5px;background:var(--separator);margin:6px 0}

/* ── Tokens ── */
.tok-total{display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
.tok-tv{font-size:1rem;font-weight:700;font-variant-numeric:tabular-nums}
.tok-tl{font-size:0.65rem;color:var(--label3)}
.tok-tc{font-size:0.72rem;font-weight:600;margin-left:auto;font-variant-numeric:tabular-nums}
.tok-cost{font-size:0.62rem;color:var(--label3);text-align:right;margin-top:-2px;margin-bottom:6px}
.tok-divider{height:0.5px;background:var(--separator);margin:8px 0;position:relative}
.tok-divider::before{content:'各模型消耗';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--bg-card);padding:0 10px;font-size:0.58rem;color:var(--label3);white-space:nowrap}
.tok-model{padding:5px 0}
.tok-mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.tok-mn{font-size:0.7rem;font-weight:500;color:var(--label);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tok-mt{font-size:0.65rem;color:var(--label2);font-feature-settings:"tnum";margin:0 6px}
.tok-mp{font-size:0.6rem;color:var(--label3);width:30px;text-align:right;font-feature-settings:"tnum"}
.tok-bar{height:5px;border-radius:3px;background:var(--fill);overflow:hidden}
.tok-bar-f{height:100%;border-radius:3px}

/* ── Quick Actions ── */
.section-list{margin:0 16px;border-radius:var(--radius-2xl);overflow:hidden}
.section-list .row{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  background:var(--bg-card);text-decoration:none;color:inherit;cursor:pointer;
  border-bottom:0.5px solid var(--separator);
}
.section-list .row:last-child{border-bottom:none}
.section-list .row:active{background:var(--fill)}
.row-ico{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.row-ico svg{width:15px;height:15px}
.row-ct{flex:1;min-width:0}
.row-t{font-size:0.85rem;font-weight:500}
.row-d{font-size:0.7rem;color:var(--label2);margin-top:1px}
.row-acc{color:var(--label3);font-size:0.7rem}
.row-acc::after{content:'\203A';font-size:1.05rem}

/* ── Schedule ── */
.schedule{padding:0 16px;display:flex;flex-wrap:wrap;gap:6px}
.sch-chip{
  display:flex;align-items:center;gap:5px;padding:6px 12px 6px 9px;
  background:var(--bg-card);border-radius:var(--radius-2xl);
  font-size:0.72rem;font-weight:500;color:var(--label);font-variant-numeric:tabular-nums;
}
.sch-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.sch-dot.on{background:var(--green)}
.sch-dot.off{background:var(--separator-thick)}
.sch-label{color:var(--label2);font-weight:400}

/* ── Calendar Overlay ── */
.overlay{display:none;position:fixed;inset:0;z-index:100}
.overlay.open{display:block}
.overlay-bg{position:absolute;inset:0;background:rgba(0,0,0,0.3);animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0}}
.sheet{
  position:absolute;bottom:0;left:0;right:0;
  background:var(--bg-card);border-radius:var(--radius-2xl) var(--radius-2xl) 0 0;
  padding:0 0 var(--safe-bottom);max-height:85vh;overflow-y:auto;
  animation:slideUp 0.3s cubic-bezier(0.32,0.72,0,1);
}
@keyframes slideUp{from{transform:translateY(100%)}}
.sheet-h{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px 8px;position:sticky;top:0;background:var(--bg-card);z-index:2;
}
.sheet-h::before{content:'';position:absolute;top:6px;left:50%;transform:translateX(-50%);width:36px;height:4px;border-radius:2px;background:var(--separator-thick)}
.sheet-h h3{font-size:1rem;font-weight:700}
.sheet-x{width:30px;height:30px;border-radius:50%;border:none;background:var(--fill);cursor:pointer;font-size:0.82rem;color:var(--label2);display:flex;align-items:center;justify-content:center}
.sheet-x:active{background:var(--fill-hv)}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:4px 20px 10px}
.cal-nav-btn{width:34px;height:34px;border-radius:50%;border:none;background:var(--fill);cursor:pointer;font-size:0.82rem;color:var(--blue);display:flex;align-items:center;justify-content:center}
.cal-nav-btn:active{background:var(--fill-hv)}
.cal-nav-lbl{font-size:0.85rem;font-weight:600}
.cal-week{display:grid;grid-template-columns:repeat(7,1fr);padding:0 20px}
.cal-wd{text-align:center;font-size:0.6rem;color:var(--label3);padding:6px 0;font-weight:500}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);padding:0 20px 12px;gap:2px}
.cal-day{aspect-ratio:1;border-radius:var(--radius-xl);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:0.75rem;cursor:pointer;gap:2px;transition:transform 0.08s}
.cal-day:active{transform:scale(0.92)}
.cal-day.tdy{background:var(--blue);color:#fff;font-weight:600}
.cal-day.emp{visibility:hidden}
.cal-day .cdots{display:flex;gap:2px;align-items:center;justify-content:center}
.cal-day .cdot{width:4px;height:4px;border-radius:50%}
.cal-day .cdot.b{background:var(--blue)}.cal-day .cdot.g{background:var(--green)}.cal-day .cdot.p{background:var(--purple)}.cal-day .cdot.o{background:var(--orange)}
.day-detail{padding:8px 20px 16px;display:none}
.day-detail.show{display:block}
.day-dtl-h{font-size:0.68rem;color:var(--label3);margin-bottom:8px;font-weight:500;letter-spacing:0.3px}
.day-dtl-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-xl);text-decoration:none;color:inherit;margin-bottom:4px}
.day-dtl-item:active{background:var(--fill)}
.day-dtl-ico{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.day-dtl-ico svg{width:14px;height:14px}
.day-dtl-lbl{font-size:0.8rem;font-weight:500}

/* ── Footer ── */
.ftr{text-align:center;padding:24px 16px 20px;font-size:0.62rem;color:var(--label3)}
.ftr a{color:var(--label2);text-decoration:none}
</style>
</head>
<body>

<!-- Status Bar -->
<div class="status-bar"><time id="statusTime"></time></div>

<!-- Profile -->
<div class="profile">
  <div class="profile-av">
    <svg viewBox="0 0 100 100" fill="none">
      <rect x="16" y="16" width="68" height="68" rx="20" stroke="#fff" stroke-width="3"/>
      <path d="M36 42 h28 M50 42 v26 M39 58 h16" stroke="#fff" stroke-width="5" stroke-linecap="round"/>

  </div>

    <div class="profile-n">Alistair</div>
    <div class="profile-s" id="profDate"></div>

</div>

<!-- PRODUCTS -->
<div class="sh"><span class="sh-l">Products</span></div>

<!-- Briefing -->

  </div>
</div>

<!-- Portfolio -->
<div class="p-card" id="portCard">
  <div class="p-card-h">
    <div class="p-card-ico" style="background:#F5F0FF">
      <svg viewBox="0 0 24 24" fill="none"><polyline points="3,17 8,10 13,12 21,6" stroke="#AF52DE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="8" cy="10" r="1.5" fill="#AF52DE"/><circle cx="13" cy="12" r="1.5" fill="#AF52DE"/><circle cx="21" cy="6" r="1.5" fill="#AF52DE"/></svg>
    </div>
    <span class="p-card-title">Portfolio</span>
    <span class="p-card-time">16:00</span>
  </div>
  <div class="p-card-body" id="portBody">
    <div class="port-loading">加载中...</div>
  </div>
</div>

<!-- Finance -->
<div class="p-card" id="finCard" onclick="window.open('https://finance.alistairlendor.com','_blank')">
  <div class="p-card-h">
    <div class="p-card-ico" style="background:#F0FAF3">
      <svg viewBox="0 0 24 24" fill="none"><rect x="2" y="7" width="20" height="10" rx="2.5" stroke="#34C759" stroke-width="1.8"/><path d="M2 12h20" stroke="#34C759" stroke-width="1.6"/><circle cx="19" cy="14.5" r="1.5" fill="#34C759"/></svg>

    <div class="fin-loading">加载中...</div>
  </div>
</div>

<!-- Tokens -->
<div class="p-card" id="tokCard" onclick="window.open('https://alistairlendor.com/usage/usage_dashboard.html','_blank')">
  <div class="p-card-h">
    <div class="p-card-ico" style="background:#FFF5F0">
      <svg viewBox="0 0 24 24" fill="none"><path d="M5 15 A7 7 0 1 1 19 15" stroke="#FF9500" stroke-width="1.8" stroke-linecap="round"/><line x1="12" y1="11" x2="12" y2="7" stroke="#FF9500" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="11" r="1.2" fill="#FF9500"/></svg>

    <span class="p-card-title">Tokens</span>
    <span class="p-card-time">12h</span>
  </div>
  <div class="p-card-body" id="tokBody">
    <div class="tok-loading">加载中...</div>
  </div>
</div>

<!-- QUICK ACTIONS -->
<div class="sh"><span class="sh-l">Quick Actions</span></div>
<div class="section-list">
  <a href="https://github.com/Alistair-lendor/alistairlendor-hub/issues/new/choose" class="row" target="_blank">
    <div class="row-ico" style="background:#F5F0FF">
      <svg viewBox="0 0 22 22" fill="none"><path d="M13 4l5 5-10 10H3v-5L13 4z" stroke="#AF52DE" stroke-width="1.6" stroke-linejoin="round"/><line x1="13" y1="4" x2="18" y2="9" stroke="#AF52DE" stroke-width="1.6" stroke-linecap="round"/></svg>

    <div class="row-acc">Anytime</div>

<!-- SCHEDULE -->
<div class="sh"><span class="sh-l">Schedule</span></div>
<div class="schedule">

<!-- Footer -->
<div class="ftr">
  Built with <a href="https://www.codebuddy.cn/work/" target="_blank">WorkBuddy</a>
  &middot; <a href="https://github.com/Alistair-lendor" target="_blank">Alistair Lendor</a>

<!-- Calendar Overlay -->
<div class="overlay" id="overlay">
  <div class="overlay-bg" id="ovBg"></div>
  <div class="sheet">
    <div class="sheet-h"><h3>History</h3><button class="sheet-x" id="sheetX">&#x2715;</button></div>
    <div class="cal-nav">
      <button class="cal-nav-btn" id="calP">&#x2039;</button>
      <span class="cal-nav-lbl" id="calM"></span>
      <button class="cal-nav-btn" id="calN">&#x203A;</button>
    </div>
    <div class="cal-week" id="calW"></div>
    <div class="cal-days" id="calD"></div>
    <div class="day-detail" id="dd"></div>
  </div>

<script>
(function(){
  'use strict';

  const P_MAP = {
    news:    { label:'Briefing',  color:'#007AFF', bg:'#EEF2FF' },
    invest:  { label:'Portfolio', color:'#AF52DE', bg:'#F5F0FF' },
    finance: { label:'Finance',   color:'#34C759', bg:'#F0FAF3' },
    usage:   { label:'Tokens',    color:'#FF9500', bg:'#FFF5F0' }
  };
  const SVG_MAP = {
    news:'<svg viewBox="0 0 14 14" fill="none"><rect x="2" y="2" width="10" height="10" rx="2" stroke="#007AFF" stroke-width="1.2"/><line x1="4" y1="5" x2="10" y2="5" stroke="#007AFF" stroke-width="1" stroke-linecap="round"/><line x1="4" y1="7.5" x2="10" y2="7.5" stroke="#007AFF" stroke-width="1" stroke-linecap="round"/><line x1="4" y1="10" x2="7" y2="10" stroke="#007AFF" stroke-width="1" stroke-linecap="round"/></svg>',
    invest:'<svg viewBox="0 0 14 14" fill="none"><polyline points="2,10 5.5,6 8.5,7.5 12,4" stroke="#AF52DE" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="4" r="1" fill="#AF52DE"/></svg>',
    finance:'<svg viewBox="0 0 14 14" fill="none"><rect x="1.5" y="4" width="11" height="6" rx="1.5" stroke="#34C759" stroke-width="1.2"/><path d="M1.5 6.5h11" stroke="#34C759" stroke-width="1.2"/><circle cx="11" cy="8.5" r="1" fill="#34C759"/></svg>',
    usage:'<svg viewBox="0 0 14 14" fill="none"><path d="M3 9.5 A4.5 4.5 0 1 1 11 9.5" stroke="#FF9500" stroke-width="1.2" stroke-linecap="round"/><line x1="7" y1="7" x2="7" y2="4.5" stroke="#FF9500" stroke-width="1.2" stroke-linecap="round"/><circle cx="7" cy="7" r="0.8" fill="#FF9500"/></svg>'
  };
  const WEEKDAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const TOKEN_COLORS = ['#3b82f6','#22c55e','#f59e0b','#8b5cf6','#ec4899','#14b8a6'];

  let ARCHIVE = {};
  let calDate = new Date(); calDate.setDate(1);

  const $ = id => document.getElementById(id);
  const statusTime = $('statusTime'), profDate = $('profDate');
  const briefBody = $('briefBody'), portBody = $('portBody'), finBody = $('finBody'), tokBody = $('tokBody');
  const ov = $('overlay'), calM = $('calM'), calD = $('calD'), calW = $('calW'), dd = $('dd');

  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  statusTime.textContent = now.toLocaleDateString('zh-CN',{weekday:'short'}) + ' ' + pad(now.getHours()) + ':' + pad(now.getMinutes());
  profDate.textContent = now.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'short'});

  /* ── Portfolio ── */
  const holdHtml = (d, color) => '<div class="port-hold"><div class="port-hl"><span class="port-hd" style="background:'+color+'"></span><span class="port-hn">'+d.name+'</span><span class="port-hc">'+d.code+'</span></div><div class="port-hr"><span class="port-hv">¥'+(d.value).toLocaleString()+'</span></div></div><div class="port-bar"><div class="port-bar-f" style="width:'+d.ratio+'%;background:'+color+'"></div></div>';
  fetch('portfolio-latest.json').then(r=>r.json()).then(d=>{
    if(d&&typeof d.value==='number'&&d.value>0){
      const fmt=n=>n.toLocaleString(), p=d.pnl||0, pct=d.return_pct||0;
      let chColor=p>=0?'var(--red)':'var(--green)';
      let spark='';
      if(d.sparkline&&d.sparkline.length>1){
        const pts=d.sparkline,min=Math.min(...pts),max=Math.max(...pts),range=max-min||1;
        const w=420,h=32,pd=2,xs=pts.map((_,i)=>(i/(pts.length-1))*(w-pd*2)+pd);
        const ys=pts.map(v=>h-pd-((v-min)/range)*(h-pd*2));
        const col=pts[pts.length-1]>=pts[0]?'var(--red)':'var(--green)';
        const line=xs.map((x,i)=>(i===0?'M':'L')+x.toFixed(1)+','+ys[i].toFixed(1)).join(' ');
        spark='<svg viewBox="0 0 420 32" preserveAspectRatio="none"><defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+col+'" stop-opacity="0.2"/><stop offset="100%" stop-color="'+col+'" stop-opacity="0"/></linearGradient></defs><path d="'+line+'" fill="none" stroke="'+col+'" stroke-width="1.5"/><path d="'+line+' L'+xs[xs.length-1].toFixed(1)+',32 L'+xs[0].toFixed(1)+',32 Z" fill="url(#sg)"/></svg>';
      }
      let holds='';
      const colors=['var(--red)','var(--blue)','var(--orange)','var(--purple)','var(--green)'];
      let i=0;
      for(const[code,info]of Object.entries(d.holdings||{})){
        holds+=holdHtml({name:info.name,code:code,value:info.value,ratio:info.ratio},colors[i%colors.length]);
        i++;
      }
      portBody.innerHTML='<div class="port-top"><span class="port-nw">¥'+fmt(d.value)+'</span><span class="port-ch" style="color:'+chColor+'">'+(p>=0?'+':'')+'¥'+fmt(p)+(pct?' ('+(pct>=0?'+':'')+pct.toFixed(2)+'%)':'')+'</span></div>'+(spark?'<div class="port-spark">'+spark+'</div>':'')+(holds?'<div class="port-divider"></div>'+holds:'');
    } else {
      portBody.innerHTML='<div class="port-empty">暂无数据</div>';
    }
  }).catch(()=>{portBody.innerHTML='<div class="port-empty">暂无数据</div>'});

  /* ── Briefing ── */
  fetch('archive-data.json').then(r=>r.json()).then(d=>{
    const dates=Object.keys(d).sort().reverse();
    for(const date of dates){
      if(d[date].news){
        const url=d[date].news;
        fetch(url).then(r=>r.text()).then(html=>{
          const title=html.match(/<title>(.*?)<\/title>/i);
          const body=html.replace(/<[^>]*>/g,'').replace(/\s+/g,' ').trim();
          const summary=body.length>120?body.substring(0,120)+'...':body;
          briefBody.innerHTML='<div class="brief-headline">'+(title?title[1].replace(' - 新闻简报',''):'今日简报')+'</div><div class="brief-summary">'+summary+'</div>';
        }).catch(()=>{
          briefBody.innerHTML='<div class="brief-headline">今日简报已生成</div><div class="brief-summary">点击查看完整内容</div>';
        });
        return;
      }
    }
    briefBody.innerHTML='<div class="brief-empty">暂无简报</div>';
  }).catch(()=>{briefBody.innerHTML='<div class="brief-empty">暂无简报</div>'});

  /* ── Finance ── */
  fetch('finance-records.json').then(r=>r.json()).then(data=>{
    if(!data||!data.length){finBody.innerHTML='<div class="fin-empty">暂无数据</div>';return;}
    const now=new Date(),thisMonth=String(now.getFullYear())+'-'+pad(now.getMonth()+1);
    const thisYear=String(now.getFullYear());
    let mInc=0,mExp=0,yInc=0,yExp=0;
    data.forEach(r=>{
      const d=r.date||'';
      if(d.startsWith(thisYear)){if(r.type==='收入'||r.type==='income')yInc+=r.amount;else yExp+=r.amount;}
      if(d.startsWith(thisMonth)){if(r.type==='收入'||r.type==='income')mInc+=r.amount;else mExp+=r.amount;}
    });
    const fmt=n=>'¥'+Math.round(n).toLocaleString();
    finBody.innerHTML=
      '<div class="fin-row"><span class="fin-l">本月收入</span><span class="fin-v inc">'+fmt(mInc)+'</span></div>'+
      '<div class="fin-row"><span class="fin-l">本月支出</span><span class="fin-v exp">'+fmt(mExp)+'</span></div>'+
      '<div class="fin-divider"></div>'+
      '<div class="fin-row"><span class="fin-l">年度收入</span><span class="fin-v">'+fmt(yInc)+'</span></div>'+
      '<div class="fin-row"><span class="fin-l">年度支出</span><span class="fin-v">'+fmt(yExp)+'</span></div>'+
      '<div class="fin-row"><span class="fin-l">净结余</span><span class="fin-v net">'+(yInc-yExp>=0?'+':'')+fmt(yInc-yExp)+'</span></div>';
  }).catch(()=>{finBody.innerHTML='<div class="fin-empty">暂无财务数据</div>'});

  /* ── Tokens ―─ */
  const tokModels=[
    {name:'deepseek-v4-flash',tokens:3876448,cost:40.88,future:53.79,pct:51.9,color:TOKEN_COLORS[0]},
    {name:'hy3-preview-agent',tokens:3313670,cost:5.85,future:7.70,pct:44.4,color:TOKEN_COLORS[1]},
    {name:'glm-5.2',tokens:120757,cost:6.74,future:8.87,pct:1.6,color:TOKEN_COLORS[2]},
    {name:'kimi-k2.7',tokens:60173,cost:2.20,future:2.90,pct:0.8,color:TOKEN_COLORS[3]},
    {name:'minimax-m3',tokens:59766,cost:2.71,future:3.56,pct:0.8,color:TOKEN_COLORS[4]},
    {name:'auto',tokens:39981,cost:0.06,future:0.08,pct:0.5,color:TOKEN_COLORS[5]}
  ];
  const totalTokens=tokModels.reduce((s,m)=>s+m.tokens,0);
  const totalCost=tokModels.reduce((s,m)=>s+m.cost,0);
  const futureCost=tokModels.reduce((s,m)=>s+m.future,0);
  const fmtT=n=>n.toLocaleString();
  let tokHtml='<div class="tok-total"><span class="tok-tv">'+fmtT(totalTokens)+'</span><span class="tok-tl">总 Token</span><span class="tok-tc" style="color:var(--red)">¥'+totalCost.toFixed(2)+'</span></div>'+
    '<div class="tok-cost">当前费率 · 7月后 <span style="color:var(--red)">¥'+futureCost.toFixed(2)+'</span> (涨'+(Math.round((futureCost/totalCost-1)*100))+'% ⚠️)</div>'+
    '<div class="tok-divider"></div>';
  tokModels.forEach(m=>{
    tokHtml+='<div class="tok-model"><div class="tok-mh"><span class="tok-mn">'+m.name+'</span><span class="tok-mt">'+fmtT(m.tokens)+'</span><span class="tok-mp">'+m.pct+'%</span></div><div class="tok-bar"><div class="tok-bar-f" style="width:'+m.pct+'%;background:'+m.color+'"></div></div></div>';
  });
  tokBody.innerHTML=tokHtml;

  /* ── Portfolio toggle ── */
  let portOpen=false;
  $('portCard').addEventListener('click',()=>{
    const holds=portBody.querySelectorAll('.port-hold,.port-bar');
    holds.forEach(el=>{el.style.display=portOpen?'':'none'});
    const div=portBody.querySelector('.port-divider');
    if(div)div.style.display=portOpen?'':'none';
    portOpen=!portOpen;
  });

  /* ── Calendar ── */
  const key=d=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
  const sameDay=(a,b)=>a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
  const today=new Date();

  function renderCal(){
    const y=calDate.getFullYear(),m=calDate.getMonth();
    calM.textContent=new Date(y,m).toLocaleDateString('en-US',{year:'numeric',month:'long'});
    calD.innerHTML='';
    const fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate();
    for(let i=0;i<fd;i++){const e=document.createElement('div');e.className='cal-day emp';calD.appendChild(e)}
    for(let d=1;d<=dim;d++){
      const dt=new Date(y,m,d),k=key(dt),el=document.createElement('div');
      el.className='cal-day';if(sameDay(dt,today))el.classList.add('tdy');
      if(ARCHIVE[k]){const ds=document.createElement('div');ds.className='cdots';const types={news:'b',invest:'p',finance:'g',usage:'o'};
        for(const[t,cls]of Object.entries(types)){if(ARCHIVE[k][t]){const s=document.createElement('span');s.className='cdot '+cls;ds.appendChild(s)}}
        el.appendChild(ds);el.addEventListener('click',()=>showDay(k));
      }else{el.addEventListener('click',()=>dd.classList.remove('show'))}
      const n=document.createElement('span');n.textContent=d;el.prepend(n);calD.appendChild(el);
    }
  }
  function showDay(k){
    const data=ARCHIVE[k];if(!data){dd.classList.remove('show');return}
    dd.classList.add('show');
    const d=new Date(k),lb=d.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
    let html='<div class="day-dtl-h">'+lb+'</div>';
    ['news','invest','finance','usage'].forEach(p=>{if(data[p]){html+='<a class="day-dtl-item" href="'+data[p]+'" target="_blank"><div class="day-dtl-ico" style="background:'+P_MAP[p].bg+'">'+SVG_MAP[p]+'</div><span class="day-dtl-lbl">'+P_MAP[p].label+'</span></a>'}});
    dd.innerHTML=html;
  }

  /* ── Fetch archive ── */
  fetch('archive-data.json').then(r=>r.json()).then(d=>{ARCHIVE=d}).catch(()=>{});

  /* ── Calendar events ── */
  $('calBtn').addEventListener('click',()=>{ov.classList.add('open');renderCal();const k=key(today);if(ARCHIVE[k])showDay(k)});
  $('ovBg').addEventListener('click',()=>ov.classList.remove('open'));
  $('sheetX').addEventListener('click',()=>ov.classList.remove('open'));
  $('calP').addEventListener('click',()=>{calDate.setMonth(calDate.getMonth()-1);renderCal()});
  $('calN').addEventListener('click',()=>{calDate.setMonth(calDate.getMonth()+1);renderCal()});
  WEEKDAYS.forEach(d=>{const e=document.createElement('div');e.className='cal-wd';e.textContent=d;calW.appendChild(e)});

  /* ── Dark mode status bar ── */
  const mq=window.matchMedia('(prefers-color-scheme:dark)');
  function updateBar(dark){const bar=document.querySelector('.status-bar');if(bar)bar.style.background=dark?'rgba(28,28,30,0.94)':'rgba(249,249,249,0.94)'}
  updateBar(mq.matches);mq.addEventListener('change',e=>updateBar(e.matches));

  /* ── Service Worker ── */
  if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});

})();
</script>
</body>
</html>
