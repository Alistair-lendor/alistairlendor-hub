name: Issue Acknowledgment
on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  acknowledge:
    runs-on: ubuntu-latest
    steps:
      - run: gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body "Task received. WorkBuddy will process it and email you the results."
        env:
          GH_TOKEN: ${{ github.token }}
