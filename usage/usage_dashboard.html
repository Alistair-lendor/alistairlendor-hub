<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>用量 · Alistair</title>
<style>
@font-face{font-family:'Geist';src:url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/font/geist-sans/Geist-Variable.woff2') format('woff2');font-weight:100 900;font-display:swap}
@font-face{font-family:'Geist Mono';src:url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/font/geist-mono/GeistMono-Variable.woff2') format('woff2');font-weight:100 900;font-display:swap}
:root{--bg:#fff;--fg:#171717;--fg2:#4d4d4d;--fg3:#666;--fg4:#808080;--line:#ebebeb;--surface:#fafafa;--f:'Geist',Arial,sans-serif;--fm:'Geist Mono',ui-monospace,monospace;--font-features:"liga","tnum";--shadow-border:0 0 0 1px rgba(0,0,0,.08);--shadow-elevation:0 2px 2px rgba(0,0,0,.04);--shadow-ambient:0 8px 8px -8px rgba(0,0,0,.04);--shadow-glow:#fafafa 0 0 0 1px;--shadow-card:var(--shadow-border),var(--shadow-elevation),var(--shadow-ambient),var(--shadow-glow);--shadow-divider:0 1px 0 0 rgba(0,0,0,.08);--focus:hsla(212,100%,48%,1);--selection:hsla(0,0%,95%,1)}
@media(prefers-color-scheme:dark){:root{--bg:#000;--fg:#ededed;--fg2:#888;--fg3:#666;--fg4:#555;--line:#222;--surface:#111;--shadow-border:0 0 0 1px rgba(255,255,255,.08);--shadow-elevation:0 2px 2px rgba(255,255,255,.04);--shadow-ambient:0 8px 8px -8px rgba(255,255,255,.04);--shadow-glow:#111 0 0 0 1px;--shadow-divider:0 1px 0 0 rgba(255,255,255,.08)}}
*{margin:0;padding:0;box-sizing:border-box;font-feature-settings:var(--font-features)}
::selection{background:var(--selection)}
html,body{height:100%}
body{font-family:var(--f);background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased;line-height:1.5;max-width:520px;margin:0 auto;padding:0 20px}
:focus-visible{outline:2px solid var(--focus);outline-offset:2px;border-radius:6px}
a{color:inherit;text-decoration:none}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:24px 0 16px;box-shadow:var(--shadow-divider)}
.hdr-l{font-size:1.5rem;font-weight:600;letter-spacing:-1.28px;line-height:1.2;cursor:pointer;transition:opacity .12s}
.hdr-l:hover{opacity:.7}
.hdr-r{font-size:.82rem;font-weight:400;color:var(--fg3);font-family:var(--fm);letter-spacing:-.02em}

.st{font-size:.82rem;font-weight:500;color:var(--fg4);text-transform:uppercase;letter-spacing:.8px;padding-top:24px;padding-bottom:12px;box-shadow:var(--shadow-divider)}

.card{padding:20px;border-radius:8px;box-shadow:var(--shadow-card);margin-bottom:16px}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
.row+.row{border-top:1px solid var(--line)}
.rl{font-size:.88rem;font-weight:400;color:var(--fg2)}
.rv{font-family:var(--fm);font-size:1.1rem;font-weight:600;letter-spacing:-.48px}
.rv.sm{font-size:.88rem;font-weight:500}

.mi{display:flex;align-items:center;gap:8px;padding:10px 0}
.mi+.mi{border-top:1px solid var(--line)}
.mn{font-size:.88rem;font-weight:500;width:96px;flex-shrink:0;letter-spacing:-.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mb{flex:1;height:4px;background:var(--line);border-radius:2px;overflow:hidden}
.mbf{height:100%;border-radius:2px;background:var(--fg)}
.mv{font-family:var(--fm);font-size:.72rem;font-weight:400;color:var(--fg3);width:56px;text-align:right;flex-shrink:0}
.mp{font-family:var(--fm);font-size:.65rem;font-weight:400;color:var(--fg4);width:24px;text-align:right;flex-shrink:0}

.tag{display:inline-block;font-size:.65rem;font-weight:500;padding:2px 8px;border-radius:6px;background:var(--surface);color:var(--fg3);box-shadow:var(--shadow-border)}

.ft{text-align:center;font-size:.72rem;color:var(--fg4);padding:24px 0 32px;border-top:1px solid var(--line);margin-top:16px}
.ft a{text-decoration:underline;text-underline-offset:2px}
.ft a:hover{opacity:.7}
</style>
</head>
<body>
<div class="hdr"><a href="https://alistairlendor.com" class="hdr-l">Alistair</a><span class="hdr-r">用量</span></div>

<div class="st">总消耗</div>
<div class="card" style="text-align:center;padding:24px">
  <div style="font-family:var(--fm);font-size:2.5rem;font-weight:700;letter-spacing:-1.6px;line-height:1">7,470,795</div>
  <div style="font-size:.82rem;color:var(--fg4);margin-top:8px;letter-spacing:-.02em">Token · 当前费率 ¥58.44</div>
  <div style="font-size:.72rem;color:var(--fg4);margin-top:4px;font-family:var(--fm)">7月后 ¥76.90 · +32%</div>
</div>

<div class="st">模型分布</div>
<div class="card" style="padding:12px 16px">
  <div class="mi"><span class="mn">deepseek-v4-flash</span><div class="mb"><div class="mbf" style="width:51.9%"></div></div><span class="mv">3,876k</span><span class="mp">52%</span></div>
  <div class="mi"><span class="mn">hy3-preview-agent</span><div class="mb"><div class="mbf" style="width:44.4%;background:var(--fg2)"></div></div><span class="mv">3,313k</span><span class="mp">44%</span></div>
  <div class="mi"><span class="mn">glm-5.2</span><div class="mb"><div class="mbf" style="width:1.6%;background:var(--fg3)"></div></div><span class="mv">120k</span><span class="mp">2%</span></div>
  <div class="mi"><span class="mn">kimi-k2.7</span><div class="mb"><div class="mbf" style="width:0.8%;background:var(--fg3)"></div></div><span class="mv">60k</span><span class="mp">1%</span></div>
  <div class="mi"><span class="mn">minimax-m3</span><div class="mb"><div class="mbf" style="width:0.8%;background:var(--fg3)"></div></div><span class="mv">59k</span><span class="mp">1%</span></div>
  <div class="mi" style="border:none"><span class="mn">auto</span><div class="mb"><div class="mbf" style="width:0.5%;background:var(--fg3)"></div></div><span class="mv">39k</span><span class="mp">1%</span></div>
</div>

<div class="st">费用参考</div>
<div class="card" style="padding:12px 16px">
  <div class="row" style="padding:8px 0"><span class="rl">当前月费</span><span class="rv sm">¥58.44</span></div>
  <div class="row" style="border:none;padding:8px 0"><span class="rl">7月后预估</span><span class="rv sm">¥76.90</span></div>
</div>

<div class="st">周期</div>
<div class="card" style="padding:12px 16px;text-align:center">
  <div style="font-size:.82rem;color:var(--fg4)">统计周期：12小时自动同步</div>
  <div style="font-family:var(--fm);font-size:.75rem;color:var(--fg3);margin-top:4px">上次更新：2026-06-22 06:00</div>
</div>

<div class="ft">Built with <a href="#">WorkBuddy</a> · <a href="#">Alistair Lendor</a></div>
</body>
</html>
