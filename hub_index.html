<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alistair — Control Center</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23000'/%3E%3Cpath d='M30 40 h40 M50 40 v30 M35 55 h20' stroke='%23fff' stroke-width='4' stroke-linecap='round' fill='none'/%3E%3C/svg%3E">
<meta name="theme-color" content="#000">

<style>
/* ── Reset ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

/* ── Vercel design tokens ── */
:root{
  --bg:#fff;
  --bg-sm:#fafafa;
  --t1:#171717;
  --t2:#4d4d4d;
  --t3:#666;
  --brdr:rgba(0,0,0,0.08) 0 0 0 1px;
  --shd:0 1px 3px rgba(0,0,0,0.06);
  --shd-hv:0 2px 12px rgba(0,0,0,0.10);
  --r-sm:6px;
  --r-md:8px;
  --r-pill:9999px;
  --c-n:#5648a0;
  --c-f:#2e7d32;
  --c-i:#1565c0;
  --c-u:#e65100;
  --c-t:#7b1fa2;
  --f:-apple-system,'Inter','SF Pro Display','Helvetica Neue',sans-serif;
}

body{
  font-family:var(--f);
  background:var(--bg-sm);
  color:var(--t1);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* ── Vercel geometric grid background ── */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,0,0,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,0,0,0.04) 1px,transparent 1px);
  background-size:48px 48px;
  pointer-events:none;z-index:0;
}

/* ── Hero ── */
.hero{
  position:relative;z-index:2;
  background:var(--bg);
  padding:80px 24px 44px;text-align:center;
  box-shadow:var(--brdr);
}
.hero-inner{max-width:440px;margin:0 auto}
.hero-logo{
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-bottom:12px;
}
.hero-logo svg{width:48px;height:48px;display:block}
.hero h1{
  font-size:2.4rem;font-weight:600;letter-spacing:-0.048rem;
  line-height:1.05;color:#000;
}
.hero .sub{
  font-size:0.92rem;color:var(--t2);letter-spacing:-0.01em;
  margin:4px 0 18px;
}
.hero-date{
  display:inline-flex;align-items:center;gap:6px;
  font-size:0.78rem;color:var(--t3);cursor:pointer;
  padding:6px 16px;border-radius:var(--r-pill);
  box-shadow:var(--brdr);
  transition:box-shadow 0.12s,background 0.12s;
  user-select:none;
}
.hero-date:hover{box-shadow:var(--shd-hv);background:var(--bg-sm)}

/* ── Container ── */
.c{position:relative;z-index:2;max-width:440px;margin:0 auto;padding:36px 16px 64px}

/* ── Section label ── */
.sl{
  font-size:0.62rem;font-weight:600;letter-spacing:0.06em;
  color:var(--t3);margin:40px 0 10px 2px;text-transform:uppercase;
}

/* ── Product icon grid ── */
.ig{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.it{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;padding:26px 12px 20px;
  background:var(--bg);border-radius:var(--r-md);
  box-shadow:var(--brdr),var(--shd);
  text-decoration:none;color:inherit;cursor:pointer;
  transition:box-shadow 0.15s,transform 0.15s;
}
.it:hover{box-shadow:var(--shd-hv);transform:translateY(-1px)}
.it-ico{
  width:48px;height:48px;border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.12s;
}
.it:hover .it-ico{transform:scale(1.06)}
.it-ico svg{width:24px;height:24px}
.it-lbl{font-size:0.8rem;font-weight:600;letter-spacing:-0.01em}
.it-sch{
  font-size:0.6rem;color:var(--t3);font-weight:500;
  font-feature-settings:"tnum";
}

/* Product-specific icon bg (Vercel-style very subtle) */
.it-n .it-ico{background:#f4f2ff}
.it-f .it-ico{background:#f0faf3}
.it-i .it-ico{background:#f0f6ff}
.it-u .it-ico{background:#fff8f0}

/* ── Portfolio inline row ── */
.pf{display:flex;gap:12px;justify-content:center;margin:8px 0 0;font-size:0.7rem;color:var(--t3);font-variant-numeric:tabular-nums}
.pf .v{color:#000;font-weight:600}

/* ── Card row ── */
.card{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  background:var(--bg);border-radius:var(--r-md);
  box-shadow:var(--brdr),var(--shd);
  text-decoration:none;color:inherit;cursor:pointer;
  transition:box-shadow 0.12s,background 0.12s;margin-bottom:8px;
}
.card:hover{box-shadow:var(--shd-hv);background:var(--bg-sm)}
.card-ico{
  width:40px;height:40px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.card-ico svg{width:20px;height:20px}
.card-ct{flex:1;min-width:0}
.card-t{font-size:0.82rem;font-weight:600}
.card-d{font-size:0.72rem;color:var(--t2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-b{
  font-size:0.6rem;font-weight:500;color:var(--t3);
  padding:2px 9px;border-radius:var(--r-pill);
  box-shadow:inset 0 0 0 1px rgba(0,0,0,0.08);
}
.card-w .card-ico{background:#f3e5f5}

/* ── Automation chips ── */
.ac{display:flex;flex-wrap:wrap;gap:6px}
.ac-i{
  display:flex;align-items:center;gap:5px;
  padding:5px 12px 5px 10px;border-radius:var(--r-pill);
  box-shadow:var(--brdr);font-size:0.7rem;font-weight:500;
  font-feature-settings:"tnum";
  background:var(--bg);
}
.ac-d{width:6px;height:6px;border-radius:50%;background:#222;display:inline-block}
.ac-i.dm .ac-d{background:#ccc}
.ac-12{font-size:0.58rem;color:var(--t3)}

/* ── History overlay ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.25);z-index:100;align-items:center;justify-content:center}
.overlay.open{display:flex}
.panel{
  background:var(--bg);border-radius:12px;width:92%;max-width:360px;
  max-height:80vh;overflow-y:auto;padding:22px 18px;
  box-shadow:0 8px 40px rgba(0,0,0,0.12);
  animation:up 0.15s ease;
}
@keyframes up{from{opacity:0;transform:translateY(12px)}}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ph h3{font-size:0.9rem;font-weight:600}
.px{width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center;color:var(--t3);background:none;border:none}
.px:hover{background:#f5f5f5}
.cn{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cnb{background:var(--bg);border-radius:6px;padding:3px 9px;cursor:pointer;font-size:0.72rem;color:var(--t2);box-shadow:var(--brdr);font-family:inherit;border:none}
.cnb:hover{background:var(--bg-sm)}
.cm{font-size:0.78rem;font-weight:600}
.cw{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px}
.cwd{text-align:center;font-size:0.6rem;color:#bbb;padding:3px 0}
.cd{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cdd{aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:0.72rem;cursor:pointer;gap:2px}
.cdd:hover{background:#f5f5f5}
.cdd.today{background:#000;color:#fff;font-weight:600}
.cdots{display:flex;gap:2px;align-items:center;justify-content:center}
cdot{width:4px;height:4px;border-radius:50%}
cdot.n{background:var(--c-n)}cdot.f{background:var(--c-f)}cdot.i{background:var(--c-i)}cdot.u{background:var(--c-u)}
.dd{margin-top:14px;padding-top:12px;box-shadow:0 -1px 0 #eee;display:none}
.dd.show{display:block}
.ddl{font-size:0.65rem;color:#888;margin-bottom:6px}
.dda{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:6px;text-decoration:none;color:inherit;font-size:0.75rem;transition:background 0.08s}
.dda:hover{background:#f5f5f5}
.ddi{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ddi svg{width:14px;height:14px}

/* ── Footer ── */
.ft{text-align:center;padding:24px 0;margin-top:32px}
.ft p{font-size:0.62rem;font-weight:500;color:#bbb}
.ft a{color:#888;text-decoration:none;transition:color 0.1s}
.ft a:hover{color:#000}

@media(max-width:400px){
  .hero{padding:56px 18px 32px}
  .hero h1{font-size:1.8rem}
  .c{padding:28px 12px 48px}
  .it{padding:20px 10px 16px}
  .it-ico{width:40px;height:40px}
  .it-ico svg{width:20px;height:20px}
}
</style>
</head>
<body>

<!-- ═══ Hero ═══ -->
<div class="hero">
  <div class="hero-inner">
    <div class="hero-logo">
      <svg viewBox="0 0 100 100" fill="none">
        <rect x="8" y="8" width="84" height="84" rx="22" stroke="#000" stroke-width="1.5"/>
        <path d="M34 38 h32 M50 38 v30" stroke="#000" stroke-width="4" stroke-linecap="round"/>
        <path d="M38 56 h16" stroke="#000" stroke-width="3.5" stroke-linecap="round"/>
        <circle cx="50" cy="50" r="2" fill="#000"/>
      </svg>
    </div>
    <h1>Alistair</h1>
    <p class="sub">Control Center</p>
    <div class="hero-date" id="dbBtn">
      <span id="dbTxt"></span><span style="font-size:0.55rem;opacity:0.5">▾</span>
    </div>
  </div>
</div>

<!-- ═══ History Overlay ═══ -->
<div class="overlay" id="overlay">
  <div class="panel">
    <div class="ph">
      <h3>History</h3>
      <button class="px" id="px">✕</button>
    </div>
    <div class="cn">
      <button class="cnb" id="calP">◀</button>
      <span class="cm" id="calM"></span>
      <button class="cnb" id="calN">▶</button>
    </div>
    <div class="cw" id="calW"></div>
    <div class="cd" id="calD"></div>
    <div class="dd" id="dd"></div>
  </div>
</div>

<!-- ═══ Content ═══ -->
<div class="c">

  <!-- Products -->
  <div class="sl">Products</div>
  <div class="ig">
    <a href="https://news.alistairlendor.com" class="it it-n" target="_blank">
      <div class="it-ico">
        <svg viewBox="0 0 24 24" fill="none">
          <rect x="3" y="2" width="18" height="20" rx="2.5" stroke="#5648a0" stroke-width="1.6"/>
          <line x1="7" y1="7" x2="17" y2="7" stroke="#5648a0" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="7" y1="11" x2="17" y2="11" stroke="#5648a0" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="7" y1="15" x2="13" y2="15" stroke="#5648a0" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="it-lbl">Briefing</span>
      <span class="it-sch">09:00</span>
    </a>
    <a href="https://finance.alistairlendor.com" class="it it-f" target="_blank">
      <div class="it-ico">
        <svg viewBox="0 0 24 24" fill="none">
          <rect x="2" y="6" width="20" height="12" rx="2.5" stroke="#2e7d32" stroke-width="1.6"/>
          <path d="M2 11h20" stroke="#2e7d32" stroke-width="1.6"/>
          <circle cx="19" cy="14" r="1.5" fill="#2e7d32"/>
        </svg>
      </div>
      <span class="it-lbl">Finance</span>
      <span class="it-sch">00:00</span>
    </a>
    <a href="https://invest.alistairlendor.com" class="it it-i" target="_blank">
      <div class="it-ico">
        <svg viewBox="0 0 24 24" fill="none">
          <polyline points="3,18 8,10 13,13 21,5" stroke="#1565c0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="8" cy="10" r="1.5" fill="#1565c0"/>
          <circle cx="13" cy="13" r="1.5" fill="#1565c0"/>
          <circle cx="21" cy="5" r="1.5" fill="#1565c0"/>
        </svg>
      </div>
      <span class="it-lbl">Portfolio</span>
      <span class="it-sch">16:00</span>
    </a>
    <a href="https://alistairlendor.com/usage/usage_dashboard.html" class="it it-u" target="_blank">
      <div class="it-ico">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M5 16 A7 7 0 1 1 19 16" stroke="#e65100" stroke-width="1.6" stroke-linecap="round"/>
          <line x1="12" y1="12" x2="12" y2="7" stroke="#e65100" stroke-width="1.6" stroke-linecap="round"/>
          <circle cx="12" cy="12" r="1.2" fill="#e65100"/>
        </svg>
      </div>
      <span class="it-lbl">Tokens</span>
      <span class="it-sch">12h</span>
    </a>
  </div>

  <!-- Portfolio dynamic stats -->
  <div id="pfRow" style="display:none"><div class="pf"><span>Value <span class="v" id="pfV"></span></span><span>·</span><span id="pfP"></span><span id="pfR"></span></div></div>

  <!-- Remote -->
  <div class="sl">Remote</div>
  <a href="https://github.com/Alistair-lendor/alistairlendor-hub/issues/new/choose" class="card card-w" target="_blank">
    <div class="card-ico">
      <svg viewBox="0 0 22 22" fill="none">
        <path d="M13 3 l5 5-10 10H3v-5L13 3z" stroke="#7b1fa2" stroke-width="1.6" stroke-linejoin="round"/>
        <line x1="13" y1="3" x2="18" y2="8" stroke="#7b1fa2" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="card-ct">
      <div class="card-t">Create Task</div>
      <div class="card-d">GitHub Issue → auto-process</div>
    </div>
    <span class="card-b">ANYTIME</span>
  </a>

  <!-- Schedule -->
  <div class="sl">Schedule</div>
  <div class="ac">
    <span class="ac-i"><span class="ac-d"></span> 00:00 Finance</span>
    <span class="ac-i"><span class="ac-d"></span> 09:00 Briefing</span>
    <span class="ac-i dm"><span class="ac-d"></span> 13:00 PingPong</span>
    <span class="ac-i"><span class="ac-d"></span> 16:00 Portfolio</span>
    <span class="ac-i dm"><span class="ac-d"></span> 23:55 Remind</span>
    <span class="ac-i"><span class="ac-d"></span> <span class="ac-12">12h</span> Usage</span>
  </div>

  <div class="ft">
    <p>Built with <a href="https://www.codebuddy.cn/work/" target="_blank">WorkBuddy</a> · <a href="https://github.com/Alistair-lendor" target="_blank">Alistair Lendor</a></p>
  </div>
</div>

<!-- ═══ Scripts ═══ -->
<script>
let ARCHIVE={};
const PM={news:{label:'Briefing',color:'#5648a0',bg:'#f4f2ff'},invest:{label:'Portfolio',color:'#1565c0',bg:'#f0f6ff'},finance:{label:'Finance',color:'#2e7d32',bg:'#f0faf3'},usage:{label:'Tokens',color:'#e65100',bg:'#fff8f0'}};
const td=new Date();
document.getElementById('dbTxt').textContent=td.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'});

fetch('archive-data.json').then(r=>r.json()).then(d=>{ARCHIVE=d}).catch(()=>{});
fetch('portfolio-latest.json').then(r=>r.json()).then(d=>{
  if(d.value&&d.value>0){
    document.getElementById('pfRow').style.display='';
    const f=n=>n.toLocaleString();
    document.getElementById('pfV').textContent='¥'+f(d.value);
    const p=d.pnl,el=document.getElementById('pfP');
    el.textContent=(p>=0?'+':'')+'¥'+f(p);el.style.color=p>=0?'#e53935':'#2e7d32';el.style.fontWeight='600';
    const r=d.return_pct,el2=document.getElementById('pfR');
    el2.textContent=' '+(r>=0?'+':'')+r.toFixed(2)+'%';el2.style.color=r>=0?'#e53935':'#2e7d32';el2.style.fontWeight='600';
  }
}).catch(()=>{});

let calDate=new Date(td.getFullYear(),td.getMonth(),1);
const ov=document.getElementById('overlay'),dd=document.getElementById('dd');
const cD=document.getElementById('calD'),cM=document.getElementById('calM'),cW=document.getElementById('calW');
['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>{const e=document.createElement('div');e.className='cwd';e.textContent=d;cW.appendChild(e)});
function p(n){return n<10?'0'+n:''+n}function fk(d){return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())}
function sd(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}
function rc(){
  const y=calDate.getFullYear(),m=calDate.getMonth();
  cM.textContent=new Date(y,m).toLocaleDateString('en-US',{year:'numeric',month:'long'});cD.innerHTML='';
  const fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate();
  for(let i=0;i<fd;i++){const e=document.createElement('div');e.className='cdd empty';cD.appendChild(e)}
  for(let d=1;d<=dim;d++){
    const dt=new Date(y,m,d),key=fk(dt),el=document.createElement('div');
    el.className='cdd';if(sd(dt,td))el.classList.add('today');
    if(ARCHIVE[key]){const dsC=document.createElement('div');dsC.className='cdots';
      if(ARCHIVE[key].news){const s=document.createElement('span');s.className='cdot n';dsC.appendChild(s)}
      if(ARCHIVE[key].finance){const s=document.createElement('span');s.className='cdot f';dsC.appendChild(s)}
      if(ARCHIVE[key].invest){const s=document.createElement('span');s.className='cdot i';dsC.appendChild(s)}
      if(ARCHIVE[key].usage){const s=document.createElement('span');s.className='cdot u';dsC.appendChild(s)}
      el.appendChild(dsC);el.addEventListener('click',()=>sd_(key));
    }else{el.style.opacity='.4';el.addEventListener('click',()=>dd.classList.remove('show'))}
    const n=document.createElement('span');n.textContent=d;el.prepend(n);cD.appendChild(el);}
}
function sd_(key){
  const data=ARCHIVE[key];if(!data){dd.classList.remove('show');return}
  dd.classList.add('show');
  const d=new Date(key),lb=d.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'}).replace('星期','周');
  let h='<div class="ddl">'+lb+'</div>';
  const si={news:'<svg viewBox="0 0 14 14" fill="none"><rect x="2" y="1.5" width="10" height="11" rx="1.5" stroke="#5648a0" stroke-width="1.2"/><line x1="4" y1="5" x2="10" y2="5" stroke="#5648a0" stroke-width="1" stroke-linecap="round"/><line x1="4" y1="7" x2="10" y2="7" stroke="#5648a0" stroke-width="1" stroke-linecap="round"/><line x1="4" y1="9" x2="7" y2="9" stroke="#5648a0" stroke-width="1" stroke-linecap="round"/></svg>',
    finance:'<svg viewBox="0 0 14 14" fill="none"><rect x="1.5" y="3.5" width="11" height="7" rx="1.5" stroke="#2e7d32" stroke-width="1.2"/><path d="M1.5 6h11" stroke="#2e7d32" stroke-width="1.2"/><circle cx="11" cy="8" r="1" fill="#2e7d32"/></svg>',
    invest:'<svg viewBox="0 0 14 14" fill="none"><polyline points="2,10 5,6 8,8 12,3" stroke="#1565c0" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="3" r="1" fill="#1565c0"/></svg>',
    usage:'<svg viewBox="0 0 14 14" fill="none"><path d="M3 9 A4.5 4.5 0 1 1 11 9" stroke="#e65100" stroke-width="1.2" stroke-linecap="round"/><line x1="7" y1="7" x2="7" y2="4.5" stroke="#e65100" stroke-width="1.2" stroke-linecap="round"/><circle cx="7" cy="7" r=".8" fill="#e65100"/></svg>'};
  ['news','invest','finance','usage'].forEach(p=>{if(data[p]){h+='<a class="dda" href="'+data[p]+'" target="_blank"><div class="ddi" style="background:'+PM[p].bg+'">'+si[p]+'</div><span>'+PM[p].label+'</span></a>'}});
  dd.innerHTML=h;
}
document.getElementById('dbBtn').addEventListener('click',()=>{ov.classList.add('open');rc();sd_(fk(td))});
document.getElementById('px').addEventListener('click',()=>ov.classList.remove('open'));
ov.addEventListener('click',e=>{if(e.target===ov)ov.classList.remove('open')});
document.getElementById('calP').addEventListener('click',()=>{calDate.setMonth(calDate.getMonth()-1);rc()});
document.getElementById('calN').addEventListener('click',()=>{calDate.setMonth(calDate.getMonth()+1);rc()});
</script>
</body>
</html>
